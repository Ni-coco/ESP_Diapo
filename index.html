<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINDIFF – ESP 902</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.css">
<style>
:root {
  --bg:       #0d0b14;
  --bg2:      #13101f;
  --surface:  rgba(255,255,255,0.04);
  --border:   rgba(167,139,250,0.18);
  --purple:   #a78bfa;
  --purple2:  #c4b5fd;
  --purple3:  #7c6fcd;
  --purple4:  #6d58e8;
  --accent:   #e0d7ff;
  --muted:    rgba(196,181,253,0.45);
  --text:     #e8e4f5;
  --text2:    rgba(232,228,245,0.6);
  --glow:     0 0 60px rgba(167,139,250,0.15);
}

/* ── BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

.reveal {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
}
.reveal .slides {
  text-align: left;
  width: 100% !important;
  height: 100% !important;
  inset: 0 !important;
  transform: none !important;
}
.reveal h1,.reveal h2,.reveal h3,.reveal h4 {
  font-family: 'Outfit', sans-serif;
  text-transform: none;
  letter-spacing: -.03em;
  color: var(--accent);
  line-height: 1.1;
}

/* Boost typography in inline "header" wrappers used in slides */
.reveal [style*="position:relative"][style*="z-index:1"] {
  font-size: 1.12em;
}

/* ── BACKGROUND NOISE TEXTURE ── */
.reveal::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4;
  pointer-events: none;
}

.reveal section {
  padding: 0 !important;
  height: 100%;
}

/* ── SLIDE WRAPPER ── */
.s {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 14px;
  padding: 52px 72px;
}

/* Keep the slide header (chip + title) at top (except title slide) */
.s:not(.slide-title) > div:has(.chip) {
  position: absolute !important;
  top: 52px;
  left: 72px;
  right: 72px;
  z-index: 2;
}

/* Keep content blocks full width (but centered container) */
.s .card,
.s .sommaire-list,
.s .team-grid,
.s .tech-grid,
.s .adv-grid,
.s .mock-grid,
.s .meth-pair,
.s .kanban-mini,
.s .jur-grid,
.s table {
  width: 100%;
  text-align: left;
}

/* ── AMBIENT GLOW ORBS ── */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  opacity: .35;
}
.orb-1 { width: 380px; height: 380px; top: -120px; left: -80px; background: radial-gradient(circle, #7c6fcd 0%, transparent 70%); }
.orb-2 { width: 280px; height: 280px; bottom: -80px; right: -60px; background: radial-gradient(circle, #a78bfa 0%, transparent 70%); }
.orb-3 { width: 200px; height: 200px; top: 40%; right: 10%; background: radial-gradient(circle, #c4b5fd 0%, transparent 70%); opacity: .18; }

/* ── CHIP / LABEL ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: .4em;
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.3);
  color: var(--purple2);
  font-family: 'Outfit', sans-serif;
  font-size: .6em;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .35em 1em;
  border-radius: 100px;
  margin-bottom: .9em;
}
.chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--purple); display: block; }

/* ── GLASS CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.9em 2em;
  min-height: 230px;
  backdrop-filter: blur(12px);
}

/* ── LISTS ── */
.card ul { list-style: none; padding: 0; margin: .5em 0 0 0; }
.card ul li {
  font-size: 1em;
  color: var(--text2);
  padding: .35em 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  display: flex;
  align-items: flex-start;
  gap: .7em;
  line-height: 1.5;
}
.card ul li:last-child { border: none; }
.card ul li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--purple); margin-top: .5em; flex-shrink: 0; }
.card p { font-size: .95em; color: var(--text2); line-height: 1.65; margin: .3em 0; }
.card strong { color: var(--purple2); font-weight: 600; }

/* ── HEADING IN SLIDE ── */
.slide-h {
  font-family: 'Outfit', sans-serif;
  font-size: 2.25em;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -.04em;
  margin-bottom: .9em;
  position: relative;
  z-index: 1;
}
.slide-h span { color: var(--purple); }

/* ══════════════════════════
   1. TITLE SLIDE
══════════════════════════ */
.slide-title {
  background: var(--bg);
  justify-content: flex-end;
  padding-bottom: 72px;
}
.slide-title .logo-mark {
  position: absolute;
  top: 52px; left: 72px;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 1.1em;
  color: var(--purple2);
  letter-spacing: -.05em;
  z-index: 2;
}
.slide-title .epitech-tag {
  position: absolute;
  top: 52px; right: 72px;
  font-size: .55em;
  color: var(--muted);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  letter-spacing: .12em;
  text-transform: uppercase;
  z-index: 2;
  border: 1px solid var(--border);
  padding: .4em .9em;
  border-radius: 8px;
}
.slide-title h1 {
  font-size: 6.6em;
  font-weight: 900;
  line-height: .95;
  position: relative;
  z-index: 2;
}
.slide-title h1 .dim { color: var(--muted); font-weight: 300; }
.slide-title .chip {
  font-size: .8em;
  padding: .45em 1.1em;
}
.slide-title .team-row {
  display: flex;
  flex-wrap: wrap;
  gap: .38em .95em;
  margin-top: 1.35em;
  position: relative;
  z-index: 2;
}
.slide-title .team-row span {
  font-size: .82em;
  color: var(--text2);
  font-family: 'Plus Jakarta Sans';
}
.slide-title .orb-1 { opacity: .5; }

/* ══════════════════════════
   2. SOMMAIRE
══════════════════════════ */
.sommaire-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .45em;
  position: relative;
  z-index: 1;
}
.som-item {
  display: flex;
  align-items: center;
  gap: .8em;
  padding: 1em 1.2em;
  min-height: 78px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: var(--surface);
  backdrop-filter: blur(8px);
  transition: border-color .2s;
}
.som-num {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: .9em;
  color: var(--purple);
  min-width: 24px;
  opacity: .8;
}
.som-label {
  font-size: .86em;
  color: var(--text2);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .05em;
}

/* ══════════════════════════
   TEAM GRID
══════════════════════════ */
.team-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: .6em;
  position: relative;
  z-index: 1;
}

@media (max-width: 1100px) {
  .team-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

/* ══════════════════════════
   TEAM LANES (alternative design)
══════════════════════════ */
.team-lanes {
  display: grid;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.lane {
  background: linear-gradient(135deg, rgba(124,111,205,.18), rgba(167,139,250,.06));
  border: 1px solid rgba(167,139,250,.24);
  border-radius: 22px;
  padding: 18px 20px;
}
.lane-h {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 14px;
  align-items: center;
  margin-bottom: 12px;
}
.lane-ico {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  font-size: 1.8em;
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.28);
}
.lane-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  letter-spacing: -.03em;
  color: var(--accent);
  font-size: 1.15em;
}
.lane-sub {
  margin-top: 4px;
  color: var(--muted);
  font-size: .9em;
}
.lane-members {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.m-pill {
  display: inline-flex;
  align-items: center;
  padding: .55em .9em;
  border-radius: 999px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(167,139,250,.18);
  color: rgba(232,228,245,.82);
  font-weight: 600;
  font-size: .98em;
}
.m-pill-ghost {
  border-style: dashed;
  color: var(--muted);
  font-weight: 600;
}

/* ══════════════════════════
   TEAM SPLIT (alternative design #2)
══════════════════════════ */
.team-split {
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 18px;
  position: relative;
  z-index: 1;
}
.team-right {
  display: grid;
  gap: 14px;
}
.pole-card {
  background: var(--surface);
  border: 1px solid rgba(167,139,250,.24);
  border-radius: 20px;
  padding: 16px 16px;
  backdrop-filter: blur(10px);
}
.pole-h {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: center;
  margin-bottom: 10px;
}
.pole-ico {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: auto;
  height: auto;
  padding: .35em .75em;
  border-radius: 999px;
  font-family: 'Outfit', sans-serif;
  font-size: .72em;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--purple2);
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.28);
}
.pole-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  letter-spacing: -.03em;
  color: var(--accent);
  font-size: 1.05em;
}
.pole-sub {
  margin-top: 3px;
  color: var(--muted);
  font-size: .88em;
}
.pole-members {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

@media (max-width: 1100px) {
  .team-split {
    grid-template-columns: 1fr;
  }
}

/* ══════════════════════════
   "EN EVOLUTION" COMPACT BLOCKS
══════════════════════════ */
.evo-flow {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 14px;
  align-items: center;
  width: 100%;
  margin: 0 auto;
}
.evo-step {
  border-radius: 18px;
  padding: 14px 16px;
  border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
}
.evo-bad {
  border-color: rgba(248,113,113,.22);
  background: rgba(248,113,113,.06);
}
.evo-good {
  border-color: rgba(134,239,172,.22);
  background: rgba(134,239,172,.06);
}
.evo-k {
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-size: .75em;
  color: var(--muted);
}
.evo-v {
  margin-top: 6px;
  font-family: 'Outfit', sans-serif;
  font-weight: 800;
  letter-spacing: -.02em;
  font-size: 1.15em;
  color: var(--accent);
}
.evo-arrow {
  font-size: 2em;
  color: var(--purple);
  opacity: .75;
  text-align: center;
}
.evo-banner {
  width: 100%;
  margin: 14px auto 0;
  padding: 14px 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(167,139,250,.14), rgba(124,111,205,.06));
  border: 1px solid rgba(167,139,250,.24);
  text-align: center;
}
.evo-banner-title {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  color: var(--purple2);
  font-size: 1.15em;
}
.evo-banner-sub {
  margin-top: 4px;
  color: rgba(232,228,245,.72);
  font-size: .98em;
}
.evo-card {
  min-height: auto;
  padding: 1.2em 1.4em;
}

@media (max-width: 900px) {
  .evo-flow {
    grid-template-columns: 1fr;
  }
  .evo-arrow {
    transform: rotate(90deg);
  }
}
.t-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.2em 1em;
  text-align: center;
}
.t-avatar {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple4), var(--purple));
  margin: 0 auto .65em;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.35em;
}
.t-card strong {
  display: block;
  font-family: 'Outfit', sans-serif;
  font-size: 1em;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: .2em;
}
.t-card span {
  font-size: .88em;
  color: var(--muted);
}

/* ══════════════════════════
   RISK TABLE
══════════════════════════ */
.rtable {
  width: 100%;
  border-collapse: collapse;
  font-size: .95em;
  position: relative;
  z-index: 1;
}
.rtable-wrap {
  width: 100%;
  max-height: 70%;
  overflow: auto;
  border-radius: 14px;
}
.rtable thead tr th {
  background: #1b1730;
  color: var(--purple2);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 1.12em;
  padding: .9em 1.08em;
  text-align: left;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 3;
}
.rtable tbody tr td {
  padding: .86em 1.08em;
  color: var(--text2);
  border-bottom: 1px solid rgba(255,255,255,.04);
  vertical-align: top;
  line-height: 1.55;
}
.rtable tbody tr:hover td { background: rgba(167,139,250,.05); }
.bd { display: inline-block; padding: .15em .55em; border-radius: 6px; font-weight: 600; font-size: .9em; }
.bd-h { background: rgba(248,113,113,.12); color: #fca5a5; border: 1px solid rgba(248,113,113,.2); }
.bd-m { background: rgba(251,191,36,.1);  color: #fde68a; border: 1px solid rgba(251,191,36,.2); }
.bd-l { background: rgba(52,211,153,.1);  color: #6ee7b7; border: 1px solid rgba(52,211,153,.2); }

/* ══════════════════════════
   CONCURRENCE
══════════════════════════ */
.ctable {
  width: 100%;
  border-collapse: collapse;
  font-size: .95em;
  position: relative;
  z-index: 1;
}
.ctable thead th {
  background: rgba(167,139,250,.1);
  color: var(--purple2);
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
  font-size: 1.1em;
  padding: .9em 1.08em;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
.ctable thead th:first-child { text-align: left; }
.ctable tbody td {
  padding: .86em 1.08em;
  color: var(--text2);
  border-bottom: 1px solid rgba(255,255,255,.04);
  text-align: center;
}
.ctable tbody td:first-child { text-align: left; font-weight: 500; color: var(--text); }
.ctable tbody tr:last-child td {
  background: var(--surface);
  color: var(--purple2);
  font-weight: 600;
}
.yes { color: #86efac; }
.no  { color: rgba(255,255,255,.2); }

/* ══════════════════════════
   ADVANTAGES
══════════════════════════ */
.adv-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .8em;
  position: relative;
  z-index: 1;
}
.adv-item {
  background: var(--surface);
  border: 1px solid rgba(167,139,250,.25);
  border-radius: 20px;
  padding: 1.95em 1.75em;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: .9em;
  min-height: 132px;
}
.adv-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: auto;
  height: auto;
  padding: .35em .75em;
  border-radius: 999px;
  font-family: 'Outfit', sans-serif;
  font-size: .72em;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--purple2);
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.28);
  flex-shrink: 0;
}
.adv-item p {
  font-family: 'Outfit', sans-serif;
  font-size: 1.02em;
  font-weight: 700;
  color: var(--purple2);
  line-height: 1.35;
}

/* ══════════════════════════
   JURIDIQUE
══════════════════════════ */
.jur-grid {
  display: grid;
  grid-template-columns: 1fr 64px 1fr;
  gap: .85em;
  align-items: center;
  position: relative;
  z-index: 1;
}
.jur-problem {
  background: rgba(248,113,113,.06);
  border: 1px solid rgba(248,113,113,.2);
  border-radius: 16px;
  padding: 1.35em 1.45em;
}
.jur-problem h4 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.02em;
  font-weight: 800;
  color: #fca5a5;
  margin-bottom: .6em;
}
.jur-solution {
  background: rgba(134,239,172,.06);
  border: 1px solid rgba(134,239,172,.2);
  border-radius: 16px;
  padding: 1.35em 1.45em;
}
.jur-solution h4 {
  font-family: 'Outfit', sans-serif;
  font-size: 1.02em;
  font-weight: 800;
  color: #86efac;
  margin-bottom: .6em;
}
.jur-problem ul, .jur-solution ul { list-style: none; padding: 0; }
.jur-problem ul li, .jur-solution ul li {
  font-size: .92em;
  color: var(--text2);
  padding: .35em 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
  display: flex; gap: .5em;
  line-height: 1.45;
}
.jur-problem ul li::before { content:'•'; color:#fca5a5; flex-shrink:0; }
.jur-solution ul li::before { content:'→'; color:#86efac; flex-shrink:0; }
.jur-problem ul li:last-child, .jur-solution ul li:last-child { border: none; }
.arrow-col {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.95em;
  color: var(--purple);
  opacity: .6;
}

/* ══════════════════════════
   TECH
══════════════════════════ */
.tech-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .7em;
  position: relative;
  z-index: 1;
  align-items: stretch;
}
.tech-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.35em 1.45em;
  display: flex;
  align-items: center;
  gap: .9em;
  height: 100%;
  min-height: 132px;
}
.tech-item .ico { font-size: 1.8em; flex-shrink: 0; }
.tech-item .ico-label {
  min-width: 56px;
  height: 56px;
  border-radius: 14px;
  display: grid;
  place-items: center;
  font-family: 'Outfit', sans-serif;
  font-size: .78em;
  font-weight: 800;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--purple2);
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.28);
}
.tech-item h4 { font-family:'Outfit';font-size:1.05em;font-weight:800;color:var(--accent);margin-bottom:.18em; }
.tech-item p { font-size:.92em;color:var(--muted); }
.tech-item .ico img { width: 56px; height: 56px; object-fit: contain; display: block; }
.tech-item > div:last-child { display: flex; flex-direction: column; justify-content: center; }

/* ══════════════════════════
   USER TABLE
══════════════════════════ */
.user-t { width:100%;border-collapse:collapse;font-size:.95em;position:relative;z-index:1; }

/* Pipeline 5 steps */
.ia-pipeline {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: .6em;
  align-items: stretch;
  position: relative;
  z-index: 1;
  margin-top: .45em;
}
.ia-step {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.15em .8em .9em;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  position: relative;
  backdrop-filter: blur(8px);
  transition: border-color .25s, transform .25s;
}
.ia-step::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: rgba(167,139,250,.45);
}
.ia-step:hover { border-color: rgba(167,139,250,.45); transform: translateY(-2px); }
.ia-step-num {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 34px;
  height: 22px;
  padding: 0 .45em;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple4), var(--purple));
  color: white;
  font-family: 'Outfit', sans-serif;
  font-size: .66em;
  font-weight: 800;
  display: grid;
  place-items: center;
  letter-spacing: .08em;
}
.ia-step-tag {
  margin-top: .1em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: .28em .65em;
  border-radius: 999px;
  background: rgba(167,139,250,.12);
  border: 1px solid rgba(167,139,250,.28);
  color: var(--purple2);

  font-size: .62em;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.ia-step:nth-child(1)::before { background: linear-gradient(90deg, rgba(96,165,250,.95), rgba(96,165,250,.45)); }
.ia-step:nth-child(2)::before { background: linear-gradient(90deg, rgba(167,139,250,.95), rgba(167,139,250,.45)); }
.ia-step:nth-child(3)::before { background: linear-gradient(90deg, rgba(251,191,36,.95), rgba(251,191,36,.45)); }
.ia-step:nth-child(4)::before { background: linear-gradient(90deg, rgba(244,114,182,.95), rgba(244,114,182,.45)); }
.ia-step:nth-child(5)::before { background: linear-gradient(90deg, rgba(52,211,153,.95), rgba(52,211,153,.45)); }

.ia-step:nth-child(1) .ia-step-tag { color: #93c5fd; border-color: rgba(96,165,250,.35); background: rgba(96,165,250,.14); }
.ia-step:nth-child(2) .ia-step-tag { color: #c4b5fd; border-color: rgba(167,139,250,.35); background: rgba(167,139,250,.14); }
.ia-step:nth-child(3) .ia-step-tag { color: #fde68a; border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.14); }
.ia-step:nth-child(4) .ia-step-tag { color: #f9a8d4; border-color: rgba(244,114,182,.35); background: rgba(244,114,182,.14); }
.ia-step:nth-child(5) .ia-step-tag { color: #86efac; border-color: rgba(52,211,153,.35); background: rgba(52,211,153,.14); }

.ia-step:nth-child(1) .ia-step-num { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
.ia-step:nth-child(2) .ia-step-num { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
.ia-step:nth-child(3) .ia-step-num { background: linear-gradient(135deg, #d97706, #fbbf24); }
.ia-step:nth-child(4) .ia-step-num { background: linear-gradient(135deg, #db2777, #f472b6); }

.ia-meta-k {
  font-family: 'Outfit', sans-serif;
  font-size: .64em;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: .09em;
  color: var(--muted);
  margin-bottom: .28em;
}
.ia-meta-v {
  font-family: 'Outfit', sans-serif;
  font-size: .84em;
  font-weight: 650;
  color: var(--purple2);
  line-height: 1.35;

</style>
</head>
<body>
<div class="reveal">
<div class="slides">

<!-- Slides are loaded from separate files -->

</div><!-- .slides -->
</div><!-- .reveal -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.min.js"></script>
<script>
const slideFiles = [
  "slides/01-intro.html",
  "slides/02-projet.html",
  "slides/03-equipe.html",
  "slides/04-methodo-tech-design.html",
  "slides/05-risques-concurrence.html",
  "slides/06-deploiement.html",
  "slides/07-juridique.html",
  "slides/08-reste-evolution.html",
  "slides/09-demo-outro.html"
];

async function loadSlides() {
  const slidesRoot = document.querySelector(".slides");
  const chunks = await Promise.all(
    slideFiles.map(async (path) => {
      // Prevent stale caching during editing / local dev
      const url = `${path}?v=${encodeURIComponent(String(Date.now()))}`;
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Impossible de charger ${path}`);
      }
      return response.text();
    })
  );
  slidesRoot.innerHTML = chunks.join("\n");
}

async function bootPresentation() {
  await loadSlides();
  Reveal.initialize({
    hash: true,
    controls: true,
    progress: true,
    slideNumber: "c/t",
    transition: "fade",
    transitionSpeed: "slow",
    backgroundTransition: "fade",
    width: 1280,
    height: 720,
    margin: 0,
    minScale: 0.2,
    maxScale: 2.0
  });
}

bootPresentation().catch((error) => {
  console.error(error);
  const isFile = window.location.protocol === "file:";
  document.querySelector(".slides").innerHTML = `
    <section>
      <div class="s">
        <div class="card">
          <p><strong>Erreur de chargement des slides.</strong></p>
          ${
            isFile
              ? `<p>Tu as ouvert le fichier en <code>file://</code> : le navigateur bloque <code>fetch()</code> (CORS).</p>
                 <p>Lance un serveur local puis ouvre <code>http://localhost:8000</code>.</p>
                 <p><code>python3 -m http.server 8000</code> (ou double-clique <code>serve.command</code>).</p>`
              : `<p>Verifie que tu lances le projet via un serveur local et que les fichiers dans <code>slides/</code> existent.</p>`
          }
        </div>
      </div>
    </section>
  `;
});
</script>
</body>
</html>
